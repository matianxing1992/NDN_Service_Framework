# Example per-instance config for the ground station.
# Command-line options override these values.

runtime-config NDNSF-UAV-APP/configs/uav_runtime.conf
ground-station-identity /example/uav/gs
serve-certificates true

target-drone A
patrol-drones A,B
ack-timeout-ms 500
timeout-ms 10000
link-stale-ms 3500
link-lost-ms 8000
lost-link-action notify
video-bitrate-kbps 8000
video-width 480
video-bitrate-policy manual
video-bitrate-auto-pressure-ms 2500
yolo-model yolo26n.pt
yolo-script NDNSF-UAV-APP/tools/yolo_detect_once.py
yolo-worker-script NDNSF-UAV-APP/tools/yolo_detect_worker.py
