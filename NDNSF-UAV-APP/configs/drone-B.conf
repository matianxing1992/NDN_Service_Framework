# Example per-instance config for drone B.
# Command-line options override these values.

runtime-config NDNSF-UAV-APP/configs/uav_runtime.conf
drone-id B
available true
serve-certificates true
# auto = use the first local V4L2 capture device, then fall back to videos/drone.mp4.
# Set this to /dev/videoX or a file path to force a specific source.
video-source auto
# Use auto to query the camera and choose a conservative V4L2 capture format
# and size. Override only for a known stable camera/port combination.
camera-v4l2-input-format auto
camera-v4l2-input-size auto
# 0 means do not force the V4L2 input frame interval; let the camera pick its
# stable default and downsample later in the encoder filter.
camera-v4l2-input-fps 0
camera-capture-on-start false
camera-record-to-local-repo false
camera-record-repo-path /tmp/ndnsf-uav-drone-B-camera.sqlite3
camera-record-object-prefix /example/uav/drone/B/repo/camera/recording
camera-record-chunk-limit 0

flight-controller-backend mock
mavlink-udp-host 127.0.0.1
mavlink-udp-port 18571
mavlink-udp-listen-port 14550
mavlink-serial-device /dev/ttyAMA0
mavlink-serial-baud 57600
configure-px4-sitl-demo-params false
