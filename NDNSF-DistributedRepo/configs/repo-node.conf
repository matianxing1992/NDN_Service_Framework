# Example NDNSF-DistributedRepo C++ repo node configuration.
#
# Copy this file for each repo node and replace the namespace/identity with
# your deployment namespace. Standalone repo nodes normally use remote mode.

service-prefix /NDNSF/DistributedRepo
group-prefix /example/repo/group
controller-prefix /example/repo/controller
identity /example/repo/repo/A
trust-schema examples/trust-schema.conf

repo-node /example/repo/repo/A
free-bytes 4000000000
used-bytes 0
recent-load 0.0
availability-score 1.0
failure-domain lab-a
storage-classes model,artifact,intermediate,binary

deployment-mode remote
serve-certificates true

storage-backend sqlite
storage-path /tmp/ndnsf-distributed-repo/repo-node-A.sqlite3
