; Local examples only. Do not use this trust schema for physical deployment.
; Production deployments should anchor validation at a concrete root certificate
; file, and that root identity should normally be the application namespace
; itself, such as /example/uav or /example/hello.

rule
{
  id "Testbed Validation Rule"
  for data
  checker
  {
    type hierarchical
    sig-type rsa-sha256
  }
}
trust-anchor
{
  type any
}
