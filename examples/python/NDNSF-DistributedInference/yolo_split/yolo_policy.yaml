# editable deployment section
# Edit these names for a real deployment.
# application: local label for this APP deployment.
application: yolo-split-demo
# controller: NDNSF ServiceController identity/prefix for permissions.
controller: /NDNSF-DistributeInference/example/controller
# group: NDN-SVS group prefix shared by all participants.
group: /NDNSF-DistributeInference/example/group

runtime:
  # user_identity: identity used when this config starts a user/client process.
  # This does not grant permission by itself; service users below do that.
  user_identity: /NDNSF-DistributeInference/example/user
  # provider_prefix: naming helper used by examples to derive concrete providers.
  provider_prefix: /NDNSF-DistributeInference/example/provider

trust:
  # app_roots: trust-schema roots for this deployment namespace.
  app_roots:
    - /NDNSF-DistributeInference/example
  # Production deployments should anchor validation at the trust-root certificate.
  # anchor_file: /path/to/root.cert

# generated authorization summary
# Read-only review aid derived from services[].users/providers.
authorization_summary:
  users:
    - identity: /NDNSF-DistributeInference/example/user
      services:
        - /AI/YOLO/SplitInference
  providers:
    - identity: /NDNSF-DistributeInference/example/provider
      services:
        - service: /AI/YOLO/SplitInference
          roles: all
    - identity: /NDNSF-DistributeInference/example/provider/A
      services:
        - service: /AI/YOLO/SplitInference
          roles: all

# generated model-plan section
# Edit users/providers per service to grant
# exact identities permission. Regenerate roles/dependencies/input/output when
# the model split changes.
services:
  - name: /AI/YOLO/SplitInference
    model: /Model/Ultralytics/YOLO/Split
    users:
      - /NDNSF-DistributeInference/example/user
    providers:
      - identity: /NDNSF-DistributeInference/example/provider
        roles: all
      - identity: /NDNSF-DistributeInference/example/provider/A
        roles: all
    roles:
      - /Stage/0
      - /Stage/1
    dependencies:
      - producers: [/Stage/0]
        consumers: [/Stage/1]
        key_scope: stage0-to-stage1
        topic_prefix: /activation
    input:
      codec: npz
      encoder: encode_initial_request(image_tensor)
      fields:
        images:
          dtype: float16
          shape: [1, 3, 640, 640]
          layout: NCHW
    output:
      codec: npz
      decoder: decode_onnx_output(response.payload)
      fields:
        output:
          dtype: float32
