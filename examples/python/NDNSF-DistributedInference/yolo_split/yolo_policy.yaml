application: yolo-split-demo
controller: /example/hello/controller
group: /example/hello/group

identities:
  user: /example/hello/user
  provider_prefix: /example/hello/provider

trust:
  app_roots:
    - /example/hello
  # Production deployments should anchor validation at the trust-root certificate.
  # anchor_file: /path/to/root.cert

services:
  - name: /AI/YOLO/SplitInference
    model: /Model/Ultralytics/YOLO/Split
    roles:
      - /Stage/0
      - /Stage/1
    dependencies:
      - producers: [/Stage/0]
        consumers: [/Stage/1]
        key_scope: stage0-to-stage1
        topic_prefix: /activation
    input:
      codec: npz
      encoder: encode_initial_request(image_tensor)
      fields:
        images:
          dtype: float16
          shape: [1, 3, 640, 640]
          layout: NCHW
    output:
      codec: npz
      decoder: decode_onnx_output(response.payload)
      fields:
        output:
          dtype: float32
    users:
      - /example/hello/user
    providers:
      - identity: /example/hello/provider
        roles: all
      - identity: /example/hello/provider/A
        roles: all
