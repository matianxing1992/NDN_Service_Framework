application: yolo-2x2-demo
controller: /example/hello/controller
group: /example/hello/group

identities:
  user: /example/hello/user
  provider_prefix: /example/hello/provider

trust:
  app_roots:
    - /example/hello
  # Production deployments should anchor validation at the trust-root certificate.
  # anchor_file: /path/to/root.cert

artifact_security:
  allowlist: []
  sandbox:
    kind: ""

services:
  - name: /AI/YOLO/2x2Inference
    model: /Model/Ultralytics/YOLO/2x2
    roles:
      - /Stage/0/Shard/0
      - /Stage/0/Shard/1
      - /Stage/1/Shard/0
      - /Stage/1/Shard/1
    dependencies:
      - producers: [/Stage/0/Shard/0]
        consumers: [/Stage/0/Shard/1]
        key_scope: stage0-internal
        topic_prefix: /activation
        tensors: [x]
      - producers: [/Stage/0/Shard/1]
        consumers: [/Stage/1/Shard/0]
        key_scope: stage0-to-stage1
        topic_prefix: /activation
        tensors: [x, saved_4]
      - producers: [/Stage/1/Shard/0]
        consumers: [/Stage/1/Shard/1]
        key_scope: stage1-internal
        topic_prefix: /activation
        tensors: [x, saved_4, saved_10, saved_13]
    input:
      codec: npz
      encoder: encode_image_for_yolo(image_tensor)
      fields:
        images:
          dtype: float32
          shape: [1, 3, 32, 32]
          layout: NCHW
    output:
      codec: npz
      decoder: decode_yolo_output(response.payload)
      fields:
        output:
          dtype: float32
    users:
      - /example/hello/user
    providers:
      - identity: /example/hello/provider
        roles: all
      - identity: /example/hello/provider/A
        roles: all
      - identity: /example/hello/provider/B
        roles: all
      - identity: /example/hello/provider/C
        roles: all

  - name: /NDNSF/DistributedRepo
    model: /NDNSF/DistributedRepo
    roles: []
    dependencies: []
    users:
      - /example/hello/user
    providers:
      - identity: /example/hello/provider/D
        roles: []
