# editable deployment section
# Edit these names for a real deployment.
# application: local label for this APP deployment; change it when this policy
#   describes a different model/application instance.
application: yolo-2x2-demo
# controller: NDNSF ServiceController identity/prefix. Set it to the controller
#   node identity that signs and distributes permissions.
controller: /NDNSF-DistributeInference/example/controller
# group: NDN-SVS group prefix shared by controller, users, and providers.
group: /NDNSF-DistributeInference/example/group

runtime:
  # user_identity: identity used when this config starts a user/client process.
  # This does not grant permission by itself; service users below do that.
  user_identity: /NDNSF-DistributeInference/example/user
  # provider_prefix: naming helper used by examples to derive provider names
  # such as /NDNSF-DistributeInference/example/provider/A. It is not permission.
  provider_prefix: /NDNSF-DistributeInference/example/provider

trust:
  # app_roots: trust-schema roots for this deployment namespace.
  app_roots:
    - /NDNSF-DistributeInference/example
  # Production deployments should anchor validation at the trust-root certificate.
  # anchor_file: /path/to/root.cert

# Artifact security section: edit only if providers should download executable
# runtimes or model artifacts dynamically from a repo.
artifact_security:
  allowlist: []
  sandbox:
    kind: ""

# generated authorization summary
# Read-only review aid derived from services[].users/providers.
authorization_summary:
  users:
    - identity: /NDNSF-DistributeInference/example/user
      services:
        - /AI/YOLO/2x2Inference
        - /NDNSF/DistributedRepo
  providers:
    - identity: /NDNSF-DistributeInference/example/provider
      services:
        - service: /AI/YOLO/2x2Inference
          roles: all
    - identity: /NDNSF-DistributeInference/example/provider/A
      services:
        - service: /AI/YOLO/2x2Inference
          roles: all
    - identity: /NDNSF-DistributeInference/example/provider/B
      services:
        - service: /AI/YOLO/2x2Inference
          roles: all
    - identity: /NDNSF-DistributeInference/example/provider/C
      services:
        - service: /AI/YOLO/2x2Inference
          roles: all
    - identity: /NDNSF-DistributeInference/example/provider/D
      services:
        - service: /NDNSF/DistributedRepo
          roles: []

# generated model-plan section
# Edit users/providers per service to grant
# exact identities permission. roles/dependencies/input/output are
# splitter/planner output and normally should be regenerated instead of
# hand-edited.
services:
  - name: /AI/YOLO/2x2Inference
    model: /Model/Ultralytics/YOLO/2x2
    users:
      - /NDNSF-DistributeInference/example/user
    providers:
      - identity: /NDNSF-DistributeInference/example/provider
        roles: all
      - identity: /NDNSF-DistributeInference/example/provider/A
        roles: all
      - identity: /NDNSF-DistributeInference/example/provider/B
        roles: all
      - identity: /NDNSF-DistributeInference/example/provider/C
        roles: all
    roles:
      - /Stage/0/Shard/0
      - /Stage/0/Shard/1
      - /Stage/1/Shard/0
      - /Stage/1/Shard/1
    dependencies:
      - producers: [/Stage/0/Shard/0]
        consumers: [/Stage/0/Shard/1]
        key_scope: stage0-internal
        topic_prefix: /activation
        tensors: [x]
      - producers: [/Stage/0/Shard/1]
        consumers: [/Stage/1/Shard/0]
        key_scope: stage0-to-stage1
        topic_prefix: /activation
        tensors: [x, saved_4]
      - producers: [/Stage/1/Shard/0]
        consumers: [/Stage/1/Shard/1]
        key_scope: stage1-internal
        topic_prefix: /activation
        tensors: [x, saved_4, saved_10, saved_13]
    input:
      codec: npz
      encoder: encode_image_for_yolo(image_tensor)
      fields:
        images:
          dtype: float32
          shape: [1, 3, 32, 32]
          layout: NCHW
    output:
      codec: npz
      decoder: decode_yolo_output(response.payload)
      fields:
        output:
          dtype: float32

  - name: /NDNSF/DistributedRepo
    model: /NDNSF/DistributedRepo
    users:
      - /NDNSF-DistributeInference/example/user
    providers:
      - identity: /NDNSF-DistributeInference/example/provider/D
        roles: []
    roles: []
    dependencies: []
