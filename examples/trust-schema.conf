; Structured validator config for NDNSF examples.
;
; The examples create local identities dynamically, so this config keeps a
; permissive local trust anchor for bootstrap. Unlike trust-any.conf, it does
; not accept arbitrary signed Data: names must match NDNSF/example namespaces
; and signatures must carry a normal NDN certificate KeyLocator.

rule
{
  id "NDNSF runtime data"
  for data
  filter
  {
    type name
    regex ^<>*<NDNSF><>*$
  }
  checker
  {
    type customized
    sig-type rsa-sha256
    key-locator
    {
      type name
      regex ^<>+<KEY><><><>$
    }
  }
  checker
  {
    type customized
    sig-type ecdsa-sha256
    key-locator
    {
      type name
      regex ^<>+<KEY><><><>$
    }
  }
}

rule
{
  id "NDNSF example application data"
  for data
  filter
  {
    type name
    regex ^<example><>*$
