; Structured validator config for NDNSF examples.
;
; The examples create local identities dynamically, so this config keeps a
; permissive local trust anchor for bootstrap. Data and certificates still use
; hierarchical validation: Data names must be under the signer identity, and
; child certificates must be named under the parent certificate namespace.
; Production deployments should replace the local anchor with a trust-root
; certificate file. The trust-root identity should normally be the application
; namespace itself, for example /example/hello, /example/uav, or /example/repo,
; so child certificates remain under their parent certificate namespace.

rule
{
  id "NDN certificates"
  for data
  filter
  {
    type name
    regex ^<>+<KEY><><><>$
  }
  checker
  {
    type hierarchical
    sig-type rsa-sha256
  }
  checker
  {
    type hierarchical
    sig-type ecdsa-sha256
  }
}

rule
{
  id "NDNSF example runtime data"
  for data
  filter
  {
    type name
    regex ^<example><>*<NDNSF><>*$
  }
  checker
  {
    type customized
    sig-type rsa-sha256
    key-locator
    {
      type name
      regex "^<example>[^<KEY>]*<KEY><>{1,3}$"
    }
  }
  checker
  {
    type customized
    sig-type ecdsa-sha256
    key-locator
    {
      type name
      regex "^<example>[^<KEY>]*<KEY><>{1,3}$"
    }
  }
}

rule
{
  id "NDN-SVS example sync data"
  for data
  filter
  {
    type name
    regex ^<example><>*<example><>*<group><>*$
  }
  checker
  {
    type customized
    sig-type rsa-sha256
    key-locator
    {
      type name
      regex "^<example>[^<KEY>]*<KEY><>{1,3}$"
    }
  }
  checker
  {
    type customized
    sig-type ecdsa-sha256
    key-locator
    {
      type name
      regex "^<example>[^<KEY>]*<KEY><>{1,3}$"
    }
  }
}

rule
{
  id "NDNSF example application data"
  for data
  filter
  {
    type name
    regex ^<example><>*$
  }
  checker
  {
    type hierarchical
    sig-type rsa-sha256
  }
  checker
  {
    type hierarchical
    sig-type ecdsa-sha256
  }
}

rule
{
  id "MUAS application data"
  for data
  filter
  {
    type name
    regex ^<muas><>*$
  }
  checker
  {
    type hierarchical
    sig-type rsa-sha256
  }
  checker
  {
    type hierarchical
    sig-type ecdsa-sha256
  }
}

rule
{
  id "NDN-SVS sync interest /example"
  for interest
  filter
  {
    type name
    regex ^<example><>*<group><>*$
  }
  checker
  {
    type customized
    sig-type rsa-sha256
    key-locator
    {
      type name
      regex ^<>*$
    }
  }
  checker
  {
    type customized
    sig-type ecdsa-sha256
    key-locator
    {
      type name
      regex ^<>*$
    }
  }
}

; Local-only fallback. Production deployments must use `type file` with the
; trust-root certificate.
trust-anchor
{
  type any
}
